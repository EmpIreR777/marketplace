stages:
  - deploy

variables:
  DOCKER_BUILDKIT: 1
  GIT_SSL_NO_VERIFY: "true"

# Deployment template
.deploy_template: &deploy_template
  stage: deploy
  script:
    - echo "Deploying to $ENVIRONMENT environment..."
    - docker system prune -f
    - apk add --no-cache curl bind-tools
    - chmod -R 755 ./backend ./frontend
    # Copy .env files for backend and frontend
    - cp ./backend/.env.$ENVIRONMENT ./backend/.env
    - cp ./frontend/.env.$ENVIRONMENT ./frontend/.env
    # Stop and remove existing containers
    - docker compose -f docker-compose-$ENVIRONMENT.yml down --remove-orphans
    # Build and start containers
    - docker compose -f docker-compose-$ENVIRONMENT.yml up -d --build
  tags:
    - $ENVIRONMENT

deploy-dev:
  <<: *deploy_template
  variables:
    ENVIRONMENT: dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG == "dev"'
  environment:
    name: dev
    url: https://dev.your-domain.com

deploy-test:
  <<: *deploy_template
  variables:
    ENVIRONMENT: test
  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'
    - if: '$CI_COMMIT_TAG == "test"'
  environment:
    name: test
    url: https://test.your-domain.com

deploy-prod:
  <<: *deploy_template
  variables:
    ENVIRONMENT: prod
  rules:
    - if: '$CI_COMMIT_BRANCH == "prod"'
    - if: '$CI_COMMIT_TAG == "prod"'
  environment:
    name: prod
    url: https://your-domain.com