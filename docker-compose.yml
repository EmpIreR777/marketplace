services:
  nginx-proxy:
    image: jwilder/nginx-proxy
    container_name: nginx_proxy
    labels:
      - "com.github.nginx-proxy.nginx-proxy"
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./backend/static:/backend_static
      - ./backend/media:/backend_media
      - ./frontend/dist:/frontend_dist
      - ./vhost.d:/etc/nginx/vhost.d
    environment:
      - DEFAULT_HOST=your-domain.com
    networks:
      - backend
    env_file:
      - ./frontend/.env

  docker-gen:
    image: nginxproxy/docker-gen
    container_name: docker_gen
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./nginx/templates:/etc/docker-gen/templates
      - ./nginx/nginx.tmpl:/etc/docker-gen/templates/nginx.tmpl
      - ./nginx/conf.d:/etc/nginx/conf.d
    command: "-notify-sighup nginx-proxy -watch /etc/docker-gen/templates/nginx.tmpl /etc/nginx/conf.d/default.conf"
    labels:
      - "com.github.nginx-proxy.docker-gen"
    networks:
      - backend

  letsencrypt:
    image: nginxproxy/acme-companion
    container_name: letsencrypt_companion
    restart: always
    depends_on:
      - nginx-proxy
      - docker-gen
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost.d:/etc/nginx/vhost.d
      - ./frontend/dist:/usr/share/nginx/html
    environment:
      - NGINX_PROXY_CONTAINER=nginx_proxy
      - NGINX_DOCKER_GEN_CONTAINER=docker_gen
      - DEFAULT_EMAIL=admin@your-domain.com

  redis:
    image: redis:6
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vue_frontend
    volumes:
      - ./frontend:/usr/src/app
    command: ["npm", "run", "build-only"]
    networks:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django_backend
    volumes:
      - ./backend:/app
      - ./backend/static:/backend_static
      - ./backend/media:/backend_media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      database:
        condition: service_healthy
    command: >
      sh -c "
      echo 'Waiting for database...' &&
      while ! nc -z database 5432; do sleep 1; done &&
      echo 'Database is available!' &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      uvicorn core.asgi:application --host 0.0.0.0 --port 8000"
    networks:
      - backend

  database:
    image: postgres:13
    container_name: postgres_db
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "54322:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  redis_data:

networks:
  backend:
    driver: bridge